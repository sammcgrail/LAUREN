<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lauren McGrail</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            background: #faf9f6;
            color: #2c2c2c;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 2rem 1rem 1rem;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #999;
            font-weight: 300;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            .subtitle {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="header">
        <h1>Lauren McGrail</h1>
        <p class="subtitle">tap anywhere</p>
    </div>
    <script>
        (function () {
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            var balls = [];
            var gravity = 0.4;
            var friction = 0.98;
            var bounceDamping = 0.7;
            var W, H, dpr;

            var palette = [
                '#f28b82', '#fbbc04', '#fff475', '#ccff90',
                '#a7ffeb', '#cbf0f8', '#aecbfa', '#d7aefb',
                '#fdcfe8', '#e6c9a8', '#f0a1a8', '#b5ead7'
            ];

            function resize() {
                dpr = window.devicePixelRatio || 1;
                W = window.innerWidth;
                H = window.innerHeight;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                canvas.style.width = W + 'px';
                canvas.style.height = H + 'px';
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            resize();
            window.addEventListener('resize', resize);

            function Ball(x, y) {
                this.x = x;
                this.y = y;
                this.r = 18 + Math.random() * 28;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = -8 - Math.random() * 8;
                this.color = palette[Math.floor(Math.random() * palette.length)];
                this.opacity = 1;
                this.life = 600 + Math.random() * 400;
                this.age = 0;
                this.squishX = 1;
                this.squishY = 1;
                this.squishVel = 0;
            }

            Ball.prototype.update = function () {
                this.vy += gravity;
                this.vx *= friction;
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off floor
                if (this.y + this.r > H) {
                    this.y = H - this.r;
                    this.vy *= -bounceDamping;
                    // Squish effect
                    this.squishX = 1.3;
                    this.squishY = 0.7;
                    this.squishVel = 0;
                }

                // Bounce off ceiling
                if (this.y - this.r < 0) {
                    this.y = this.r;
                    this.vy *= -bounceDamping;
                }

                // Bounce off walls
                if (this.x + this.r > W) {
                    this.x = W - this.r;
                    this.vx *= -bounceDamping;
                }
                if (this.x - this.r < 0) {
                    this.x = this.r;
                    this.vx *= -bounceDamping;
                }

                // Squish spring animation
                this.squishX += (1 - this.squishX) * 0.15;
                this.squishY += (1 - this.squishY) * 0.15;

                this.age++;
                if (this.age > this.life * 0.7) {
                    this.opacity = 1 - (this.age - this.life * 0.7) / (this.life * 0.3);
                }
            };

            Ball.prototype.draw = function () {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.opacity);
                ctx.translate(this.x, this.y);
                ctx.scale(this.squishX, this.squishY);

                // Shadow
                ctx.beginPath();
                ctx.arc(2, 2, this.r, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.08)';
                ctx.fill();

                // Ball
                ctx.beginPath();
                ctx.arc(0, 0, this.r, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(-this.r * 0.25, -this.r * 0.25, this.r * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.fill();

                ctx.restore();
            };

            Ball.prototype.alive = function () {
                return this.age < this.life;
            };

            function spawnBalls(x, y, count) {
                for (var i = 0; i < count; i++) {
                    balls.push(new Ball(x, y));
                }
                // Cap at 80 balls for performance
                while (balls.length > 80) {
                    balls.shift();
                }
            }

            function handleInteraction(x, y) {
                spawnBalls(x, y, 3 + Math.floor(Math.random() * 3));
            }

            // Mouse events
            canvas.addEventListener('mousedown', function (e) {
                handleInteraction(e.clientX, e.clientY);
            });
            canvas.addEventListener('mousemove', function (e) {
                if (e.buttons === 1) {
                    handleInteraction(e.clientX, e.clientY);
                }
            });

            // Touch events
            canvas.addEventListener('touchstart', function (e) {
                e.preventDefault();
                for (var i = 0; i < e.touches.length; i++) {
                    handleInteraction(e.touches[i].clientX, e.touches[i].clientY);
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', function (e) {
                e.preventDefault();
                for (var i = 0; i < e.changedTouches.length; i++) {
                    handleInteraction(e.changedTouches[i].clientX, e.changedTouches[i].clientY);
                }
            }, { passive: false });

            // Ball-to-ball collisions
            function collideBalls() {
                for (var i = 0; i < balls.length; i++) {
                    for (var j = i + 1; j < balls.length; j++) {
                        var a = balls[i];
                        var b = balls[j];
                        var dx = b.x - a.x;
                        var dy = b.y - a.y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        var minDist = a.r + b.r;
                        if (dist < minDist && dist > 0) {
                            var nx = dx / dist;
                            var ny = dy / dist;
                            var overlap = (minDist - dist) / 2;
                            a.x -= nx * overlap;
                            a.y -= ny * overlap;
                            b.x += nx * overlap;
                            b.y += ny * overlap;

                            var dvx = a.vx - b.vx;
                            var dvy = a.vy - b.vy;
                            var dot = dvx * nx + dvy * ny;
                            if (dot > 0) {
                                a.vx -= dot * nx * 0.5;
                                a.vy -= dot * ny * 0.5;
                                b.vx += dot * nx * 0.5;
                                b.vy += dot * ny * 0.5;
                            }
                        }
                    }
                }
            }

            function loop() {
                ctx.clearRect(0, 0, W, H);

                collideBalls();

                for (var i = balls.length - 1; i >= 0; i--) {
                    balls[i].update();
                    if (!balls[i].alive()) {
                        balls.splice(i, 1);
                    }
                }

                for (var k = 0; k < balls.length; k++) {
                    balls[k].draw();
                }

                requestAnimationFrame(loop);
            }

            requestAnimationFrame(loop);
        })();
    </script>
</body>
</html>
