<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lauren McGrail - Resume</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: #faf9f6;
            color: #2c2c2c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            color: #999;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .back-link {
            text-decoration: none;
            color: #999;
            font-size: 0.9rem;
            border-bottom: 1px solid #ddd;
            padding-bottom: 2px;
            transition: color 0.2s, border-color 0.2s;
        }

        .back-link:hover {
            color: #2c2c2c;
            border-color: #2c2c2c;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume</h1>
        <p>Coming soon.</p>
        <a href="/" class="back-link">&larr; home</a>
    </div>
</body>
</html>
