<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portsmouth Weather Cat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: background 0.8s ease;
            overflow: hidden;
            position: relative;
        }

        body.sunny { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
        body.cloudy { background: linear-gradient(135deg, #d7d2cc 0%, #b4afa9 100%); }
        body.rainy { background: linear-gradient(135deg, #89a0b4 0%, #636fa4 100%); }
        body.snowy { background: linear-gradient(135deg, #e6e9f0 0%, #c8d6e5 100%); }
        body.stormy { background: linear-gradient(135deg, #4a4a6a 0%, #2c2c3e 100%); }
        body.foggy { background: linear-gradient(135deg, #c9ccd3 0%, #9fa5ae 100%); }
        body.night { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        body.loading { background: #faf9f6; }

        .container {
            text-align: center;
            padding: 1rem;
            z-index: 2;
        }

        #cat-display {
            width: 320px;
            height: 320px;
            margin: 0 auto 1.5rem;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: rgba(255,255,255,0.1);
        }

        #cat-display img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #cat-display img.loaded {
            opacity: 1;
        }

        #cat-display .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: rgba(255,255,255,0.7);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        #cat-display .loading-spinner.hidden { display: none; }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .weather-info {
            font-size: 1.1rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            transition: color 0.8s;
        }

        .temp {
            font-size: 2.5rem;
            font-weight: 200;
            margin-bottom: 0.3rem;
        }

        .location {
            font-size: 0.85rem;
            opacity: 0.6;
            margin-bottom: 1.5rem;
        }

        .hint {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-top: 1rem;
            transition: opacity 0.3s, font-size 0.3s;
        }

        body.rainy .weather-info,
        body.stormy .weather-info,
        body.night .weather-info { color: #e0e0e0; }
        body.stormy .temp,
        body.night .temp { color: #fff; }
        body.rainy .temp { color: #f0f0f0; }

        .back-link {
            position: fixed;
            top: 1rem;
            left: 1rem;
            text-decoration: none;
            color: inherit;
            opacity: 0.5;
            font-size: 0.9rem;
            z-index: 10;
        }

        .rain-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
            display: none;
        }
        body.rainy .rain-container,
        body.stormy .rain-container { display: block; }

        .raindrop {
            position: absolute;
            top: -20px;
            width: 2px;
            height: 15px;
            background: rgba(255,255,255,0.3);
            border-radius: 0 0 2px 2px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh); }
        }

        .snow-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
            display: none;
        }
        body.snowy .snow-container { display: block; }

        .snowflake {
            position: absolute;
            top: -10px;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            animation: snowfall linear infinite;
        }

        @keyframes snowfall {
            to { transform: translateY(110vh) translateX(30px); }
        }

        @media (max-width: 400px) {
            #cat-display { width: 280px; height: 280px; }
        }
    </style>
</head>
<body class="loading">
    <a href="/" class="back-link">&larr; home</a>

    <div class="rain-container" id="rain"></div>
    <div class="snow-container" id="snow"></div>

    <div class="container">
        <div id="cat-display">
            <div class="loading-spinner" id="spinner"></div>
        </div>
        <div class="temp" id="temp">...</div>
        <div class="weather-info" id="weather-desc">fetching weather...</div>
        <div class="location">Portsmouth, UK</div>
        <div class="hint" id="hint">tap for a new cat</div>
    </div>

    <script>
    (function () {
        var weatherMap = {
            0: { type: 'sunny', desc: 'Clear sky' },
            1: { type: 'sunny', desc: 'Mostly clear' },
            2: { type: 'cloudy', desc: 'Partly cloudy' },
            3: { type: 'cloudy', desc: 'Overcast' },
            45: { type: 'foggy', desc: 'Foggy' },
            48: { type: 'foggy', desc: 'Depositing rime fog' },
            51: { type: 'rainy', desc: 'Light drizzle' },
            53: { type: 'rainy', desc: 'Moderate drizzle' },
            55: { type: 'rainy', desc: 'Dense drizzle' },
            56: { type: 'rainy', desc: 'Freezing drizzle' },
            57: { type: 'rainy', desc: 'Heavy freezing drizzle' },
            61: { type: 'rainy', desc: 'Slight rain' },
            63: { type: 'rainy', desc: 'Moderate rain' },
            65: { type: 'rainy', desc: 'Heavy rain' },
            66: { type: 'rainy', desc: 'Freezing rain' },
            67: { type: 'rainy', desc: 'Heavy freezing rain' },
            71: { type: 'snowy', desc: 'Slight snow' },
            73: { type: 'snowy', desc: 'Moderate snow' },
            75: { type: 'snowy', desc: 'Heavy snow' },
            77: { type: 'snowy', desc: 'Snow grains' },
            80: { type: 'rainy', desc: 'Rain showers' },
            81: { type: 'rainy', desc: 'Moderate rain showers' },
            82: { type: 'stormy', desc: 'Violent rain showers' },
            85: { type: 'snowy', desc: 'Snow showers' },
            86: { type: 'snowy', desc: 'Heavy snow showers' },
            95: { type: 'stormy', desc: 'Thunderstorm' },
            96: { type: 'stormy', desc: 'Thunderstorm with hail' },
            99: { type: 'stormy', desc: 'Thunderstorm with heavy hail' }
        };

        // Weather-specific cat prompts for AI image generation
        var catPrompts = {
            sunny: [
                'cute happy cat wearing tiny sunglasses lounging in warm sunshine, golden hour light, adorable, photo',
                'fluffy cat basking in a sunbeam on a windowsill, warm cozy vibes, cute, photo',
                'orange tabby cat stretching happily in a sunny garden, bright cheerful, photo',
                'cat with eyes closed enjoying warm sun on its face, peaceful content, photo'
            ],
            cloudy: [
                'cozy cat curled up on a grey day looking out a window, moody atmospheric, cute, photo',
                'sleepy cat napping on a soft blanket on an overcast day, cozy vibes, photo',
                'fluffy grey cat sitting calmly on a cloudy day, soft diffused light, cute, photo',
                'cat sitting on a windowsill watching grey clouds drift by, contemplative, cute, photo'
            ],
            rainy: [
                'grumpy cat looking annoyed at rain through a window, wet glass droplets, funny cute, photo',
                'cat with a tiny raincoat looking unimpressed in the rain, adorable funny, photo',
                'fluffy cat pressing its nose against a rainy window, moody cozy, cute, photo',
                'cat hiding under a blanket during a rainstorm, cozy and grumpy, cute, photo'
            ],
            snowy: [
                'fluffy cat in a tiny knitted scarf watching snow fall, cozy winter vibes, adorable, photo',
                'cat with snowflakes on its whiskers looking amazed, winter wonderland, cute, photo',
                'kitten seeing snow for the first time through a frosty window, wide eyes, adorable, photo',
                'fluffy white cat blending into snowy scenery, only eyes visible, cute funny, photo'
            ],
            stormy: [
                'dramatic cat with wind-blown fur during a storm, intense eyes, cinematic, photo',
                'cat hiding under furniture during thunder, big scared eyes, cute funny, photo',
                'brave cat sitting in front of a stormy sky, dramatic lighting, majestic, photo',
                'cat with puffed up fur startled by lightning, funny cute, photo'
            ],
            foggy: [
                'mysterious cat emerging from thick fog, ethereal atmospheric, beautiful, photo',
                'cat with squinted eyes in misty foggy weather, moody mysterious, cute, photo',
                'silhouette of a cat in dense fog, spooky atmospheric, artistic, photo',
                'sleepy cat barely visible through morning fog, dreamy soft, cute, photo'
            ],
            night: [
                'cat with glowing eyes sitting in moonlight, mysterious beautiful, night photography, photo',
                'black cat silhouette against a full moon, dramatic night sky, artistic, photo',
                'cozy cat curled up by a warm lamp at night, soft warm lighting, cute, photo',
                'cat sitting on a rooftop looking at stars, peaceful night scene, beautiful, photo'
            ]
        };

        var currentWeather = null;
        var generating = false;

        function getRandomSeed() {
            return Math.floor(Math.random() * 999999);
        }

        function generateCatImage(weatherType) {
            if (generating) return;
            generating = true;

            var spinner = document.getElementById('spinner');
            var display = document.getElementById('cat-display');
            var hint = document.getElementById('hint');

            spinner.classList.remove('hidden');
            hint.textContent = 'generating...';
            hint.style.opacity = '0.8';

            var prompts = catPrompts[weatherType] || catPrompts.cloudy;
            var prompt = prompts[Math.floor(Math.random() * prompts.length)];
            var seed = getRandomSeed();

            var url = 'https://image.pollinations.ai/prompt/' +
                encodeURIComponent(prompt) +
                '?width=640&height=640&seed=' + seed + '&nologo=true';

            // Remove old image if any
            var oldImg = display.querySelector('img');
            if (oldImg) oldImg.remove();

            var img = new Image();
            img.crossOrigin = 'anonymous';

            img.onload = function () {
                spinner.classList.add('hidden');
                display.appendChild(img);
                // Trigger fade-in
                requestAnimationFrame(function () {
                    img.classList.add('loaded');
                });
                hint.textContent = 'tap for a new cat';
                hint.style.opacity = '0.5';
                generating = false;
            };

            img.onerror = function () {
                spinner.classList.add('hidden');
                hint.textContent = 'image failed, tap to retry';
                hint.style.opacity = '0.7';
                generating = false;
            };

            img.src = url;
        }

        function createRain() {
            var container = document.getElementById('rain');
            container.innerHTML = '';
            for (var i = 0; i < 60; i++) {
                var drop = document.createElement('div');
                drop.className = 'raindrop';
                drop.style.left = Math.random() * 100 + '%';
                drop.style.animationDuration = (0.5 + Math.random() * 0.5) + 's';
                drop.style.animationDelay = Math.random() * 2 + 's';
                drop.style.opacity = 0.2 + Math.random() * 0.4;
                container.appendChild(drop);
            }
        }

        function createSnow() {
            var container = document.getElementById('snow');
            container.innerHTML = '';
            for (var i = 0; i < 40; i++) {
                var flake = document.createElement('div');
                flake.className = 'snowflake';
                flake.style.left = Math.random() * 100 + '%';
                flake.style.animationDuration = (3 + Math.random() * 4) + 's';
                flake.style.animationDelay = Math.random() * 3 + 's';
                flake.style.width = (4 + Math.random() * 6) + 'px';
                flake.style.height = flake.style.width;
                container.appendChild(flake);
            }
        }

        function isNightTime() {
            var now = new Date();
            var ukHour = new Date(now.toLocaleString('en-US', { timeZone: 'Europe/London' })).getHours();
            return ukHour >= 20 || ukHour < 6;
        }

        function fetchWeather() {
            var url = 'https://api.open-meteo.com/v1/forecast?latitude=50.8058&longitude=-1.0872&current=temperature_2m,weather_code,wind_speed_10m&timezone=Europe/London';

            fetch(url)
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    var temp = Math.round(data.current.temperature_2m);
                    var code = data.current.weather_code;
                    var weather = weatherMap[code] || { type: 'cloudy', desc: 'Unknown' };

                    if (isNightTime() && (weather.type === 'sunny' || weather.type === 'cloudy')) {
                        currentWeather = 'night';
                        document.body.className = 'night';
                        document.getElementById('weather-desc').textContent = weather.desc + ' (night)';
                    } else {
                        currentWeather = weather.type;
                        document.body.className = weather.type;
                        document.getElementById('weather-desc').textContent = weather.desc;
                    }

                    document.getElementById('temp').textContent = temp + '\u00B0C';

                    if (currentWeather === 'rainy' || currentWeather === 'stormy') createRain();
                    if (currentWeather === 'snowy') createSnow();

                    generateCatImage(currentWeather);
                })
                .catch(function () {
                    document.getElementById('weather-desc').textContent = 'could not fetch weather';
                    document.body.className = 'cloudy';
                    currentWeather = 'cloudy';
                    generateCatImage('cloudy');
                });
        }

        // Tap to generate new cat
        document.getElementById('cat-display').addEventListener('click', function () {
            generateCatImage(currentWeather || 'cloudy');
        });
        document.getElementById('cat-display').addEventListener('touchstart', function (e) {
            e.preventDefault();
            generateCatImage(currentWeather || 'cloudy');
        }, { passive: false });

        fetchWeather();
    })();
    </script>
</body>
</html>
